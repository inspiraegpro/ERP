<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليل الفنيين - Wrapstyle ERP</title>
    <link rel="stylesheet" href="/improved-styles.css">
    <style>
        :root { --p:#163a5f; --s:#526277; --a:#b98918; --ok:#1f6f5f; --er:#9f3a38; --bd:rgba(22,58,95,.12); --sf:rgba(255,255,255,.97); --soft:#f5f7fb; }
        body { margin:0; font-family:"Segoe UI",Tahoma,sans-serif; background:radial-gradient(circle at top left,rgba(185,137,24,.14),transparent 20rem),linear-gradient(180deg,#eef3f8 0%,#f8fafc 100%); color:var(--p); }
        .shell { max-width:1380px; margin:0 auto; padding:2rem 1.25rem 3rem; }
        .hero,.card { border-radius:24px; box-shadow:0 18px 38px rgba(22,58,95,.08); }
        .hero { background:linear-gradient(135deg,var(--p),#244c73); color:#fff; padding:2rem; margin-bottom:1.25rem; }
        .hero h1 { margin:0 0 .7rem; }
        .hero p { margin:0; color:rgba(255,255,255,.85); line-height:1.85; max-width:56rem; }
        .tags { display:flex; flex-wrap:wrap; gap:.7rem; margin-top:1rem; }
        .tag { padding:.7rem .95rem; border-radius:999px; background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.18); font-weight:700; }
        .card { background:var(--sf); border:1px solid var(--bd); padding:1.25rem; margin-bottom:1.25rem; }
        .toolbar { display:flex; justify-content:space-between; align-items:center; gap:1rem; flex-wrap:wrap; }
        .toolbar input { min-width:280px; }
        .field input { width:100%; box-sizing:border-box; border:1px solid rgba(82,98,119,.2); border-radius:14px; padding:.85rem .95rem; background:#fff; color:var(--p); font-size:.96rem; }
        .btn { border:none; border-radius:14px; padding:.95rem 1.15rem; font-size:.95rem; font-weight:800; cursor:pointer; box-shadow:0 10px 22px rgba(22,58,95,.12); text-decoration:none; }
        .btn.primary { background:var(--p); color:#fff; } .btn.accent { background:var(--a); color:#fff; } .btn.light { background:#fff; color:var(--p); border:1px solid var(--bd); }
        table { width:100%; border-collapse:collapse; }
        thead th { background:#eef2f7; color:var(--p); padding:1rem .8rem; border-bottom:1px solid var(--bd); font-size:.9rem; }
        tbody td { padding:.75rem .65rem; border-bottom:1px solid rgba(82,98,119,.12); text-align:center; }
        .status { display:inline-flex; padding:.35rem .7rem; border-radius:999px; font-weight:700; font-size:.82rem; }
        .status.active { background:rgba(31,111,95,.1); color:var(--ok); }
        .status.inactive { background:rgba(159,58,56,.1); color:var(--er); }
        .empty-state { padding:2rem; text-align:center; color:#738396; }
    </style>
</head>
<body>
<div class="shell">
    <section class="hero">
        <h1>دليل الفنيين</h1>
        <p>قائمة الفنيين النشطين فقط، مع إمكانية إضافة فني جديد بسرعة وتنقل مباشر إلى شاشة التكويد.</p>
        <div class="tags">
            <span class="tag">فنيين</span>
            <span class="tag">تقييم الأداء</span>
            <span class="tag">ربط أوامر التشغيل</span>
        </div>
    </section>
    <div id="messageBox" class="status-box"></div>
    <section class="card">
        <div class="toolbar">
            <input id="search" placeholder="ابحث بالاسم أو الكود" oninput="filterTable()">
            <div>
                <a class="btn light" href="/hr/employees_list.html">العودة إلى الموظفين</a>
                <a class="btn primary" href="/hr/employee_coding.html?jobTitle=فني&department=ورشة">إضافة فني</a>
            </div>
        </div>
        <table>
            <thead>
                <tr>
                    <th>الكود</th>
                    <th>الاسم</th>
                    <th>الوظيفة</th>
                    <th>القسم</th>
                    <th>إجمالي الراتب</th>
                    <th>رصيد الإجازات</th>
                    <th>الحالة</th>
                    <th>الإجراءات</th>
                </tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>
    </section>
</div>
<script>
    const API = '/api/hr';
    const token = localStorage.getItem('token') || '';
    let technicians = [];
    function authHeaders(includeJson = false) {
        const headers = {};
        if (includeJson) headers['Content-Type'] = 'application/json';
        if (token) headers['Authorization'] = `Bearer ${token}`;
        return headers;
    }
    document.addEventListener('DOMContentLoaded', load);
    async function load() {
        try {
            const res = await fetch(`${API}/employees?activeOnly=true&technicianOnly=true`, { headers: authHeaders() });
            technicians = await res.json();
            render(technicians);
        } catch (e) {
            setMessage('خطأ في الاتصال بالسيرفر.', 'error');
        }
    }
    function setMessage(message, type = 'ok') {
        const box = document.getElementById('messageBox');
        box.className = `status-box ${type === 'error' ? 'error' : 'success'}`;
        box.textContent = message;
    }
    function render(list) {
        const tbody = document.getElementById('tbody');
        if (!list.length) {
            tbody.innerHTML = '<tr><td colspan="8" class="empty-state">لا يوجد فنيين نشطين حتى الآن.</td></tr>';
            return;
        }
        tbody.innerHTML = list.map((e) => `
            <tr>
                <td>${e.code || '-'}</td>
                <td style="font-weight:700">${e.name || '-'}</td>
                <td>${e.jobTitle || '-'}</td>
                <td>${e.department || '-'}</td>
                <td>${Number(e.totalSalary || 0).toFixed(2)}</td>
                <td>${Number(e.vacationBalance || 0).toFixed(2)}</td>
                <td><span class="status ${e.status === 'Active' ? 'active' : 'inactive'}">${e.status === 'Active' ? 'نشط' : 'غير نشط'}</span></td>
                <td><a class="btn accent" href="/hr/employee_coding.html?id=${e._id}">تعديل</a></td>
            </tr>
        `).join('');
    }
    function filterTable() {
        const term = document.getElementById('search').value.toLowerCase();
        const filtered = technicians.filter((e) => (e.name || '').toLowerCase().includes(term) || (e.code || '').toLowerCase().includes(term));
        render(filtered);
    }
</script>
<script src="/global-navigation.js"></script>
</body>
</html>
