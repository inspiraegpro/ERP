<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ميزان مراجعة الموردين</title>
    <link rel="stylesheet" href="/improved-styles.css">
    <style>
        body { margin: 0; font-family: "Segoe UI", Tahoma, sans-serif; background: #f5f7fb; color: #163a5f; }
        .shell { max-width: 1380px; margin: 0 auto; padding: 2rem 1.25rem 3rem; }
        .hero, .card { background: #fff; border-radius: 24px; box-shadow: 0 18px 38px rgba(22,58,95,.08); padding: 2rem; margin-bottom: 1.25rem; }
        .hero h1 { margin: 0 0 .8rem; font-size: clamp(2rem, 3vw, 2.6rem); }
        .hero p { margin: 0; color: #526277; line-height: 1.85; }
        .hero-actions { display: flex; flex-wrap: wrap; gap: 0.75rem; margin-top: 1rem; }
        .btn { text-decoration: none; display: inline-flex; align-items: center; justify-content: center; border-radius: 14px; padding: 0.95rem 1.15rem; font-weight: 700; color: #fff; background: #163a5f; }
        .btn.light { background: #f8fafc; color: #163a5f; border: 1px solid rgba(22,58,95,.12); }
        .head { display: flex; justify-content: space-between; align-items: center; gap: 1rem; flex-wrap: wrap; margin-bottom: 1rem; }
        .head h2 { margin: 0; }
        .hint { color: #738396; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1rem; }
        .module-card { text-decoration: none; color: inherit; display: block; background: #fff; border: 1px solid rgba(22,58,95,.12); border-radius: 20px; padding: 1.1rem; transition: transform .18s ease, border-color .18s ease; }
        .module-card:hover { transform: translateY(-2px); border-color: rgba(22,58,95,.2); }
        .module-icon { width: 58px; height: 58px; border-radius: 16px; display: flex; align-items: center; justify-content: center; background: #edf3f8; color: #163a5f; font-weight: 800; font-size: 1.2rem; margin-bottom: 1rem; }
        .module-card h3 { margin: 0 0 .5rem; color: #163a5f; }
        .module-card p { margin: 0; color: #526277; line-height: 1.75; }
    </style>
</head>
<body>
    <div class="shell">
        <section class="hero">
            <h1>ميزان مراجعة الموردين</h1>
            <p>هذه الصفحة توفر الوصول السريع لتقرير ميزان مراجعة الموردين مع رابط للعودة إلى واجهة مشتريات Wrapstyle ERP.</p>
            <div class="hero-actions">
                <a class="btn light" href="/purchases/purchase_list.html">العودة إلى مشتريات</a>
            </div>
        </section>

        <section class="card">
            <div class="head">
                <div>
                    <h2>الوصول السريع</h2>
                    <p class="hint">الوحدات المتاحة للوصول السريع داخل قسم المشتريات.</p>
                </div>
            </div>
            <div class="grid">
                <a class="module-card" href="/purchases/suppliers_balance.html">
                    <div class="module-icon">⚖️</div>
                    <h3>ميزان مراجعة الموردين</h3>
                    <p>عرض كشف حساب الموردين والتحقق من الأرصدة.</p>
                </a>
            </div>
        </section>
    </div>
</body>
</html>
