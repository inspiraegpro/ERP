<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مراكز التكلفة</title>
    <script src="/common-functions.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f1f5f9; }
        .card { background: white; padding: 25px; border-radius: 10px; max-width: 800px; margin: 0 auto; }
        input, select { width: 100%; padding: 8px; margin: 5px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { background: #163a5f; color: white; border: none; padding: 8px 16px; border-radius: 5px; cursor: pointer; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background: #163a5f; color: white; }
    </style>
</head>
<body>
<div class="card">
    <h2>مراكز التكلفة</h2>
    <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <input type="text" id="code" placeholder="الكود (مثال: 101)">
        <input type="text" id="name" placeholder="الاسم (مثال: فرع التجمع)">
        <select id="type">
            <option value="Production">إنتاج وتشغيل</option>
            <option value="Sales">بيع وتسويق</option>
            <option value="Admin">إداري وعمومي</option>
        </select>
        <button onclick="save()">حفظ</button>
    </div>
    <table id="tbl">
        <thead><tr><th>الكود</th><th>الاسم</th><th>النوع</th><th>إجراءات</th></tr></thead>
        <tbody></tbody>
    </table>
</div>
<script>
    const API = '/api/cost-centers';
    async function load() {
        const res = await fetch(API, { headers: Auth.getHeaders() });
        const data = await res.json();
        const tbody = document.querySelector('#tbl tbody');
        tbody.innerHTML = data.map(c => `
            <tr>
                <td>${c.code}</td>
                <td>${c.name}</td>
                <td>${c.type}</td>
                <td><button onclick="del('${c._id}')">حذف</button></td>
            </tr>
        `).join('');
    }
    async function save() {
        const payload = {
            code: document.getElementById('code').value,
            name: document.getElementById('name').value,
            type: document.getElementById('type').value
        };
        if(!payload.code || !payload.name) return alert('املأ الكود والاسم');
        await fetch(API, { method:'POST', headers: Auth.getHeaders(true), body: JSON.stringify(payload) });
        load();
        document.getElementById('code').value = '';
        document.getElementById('name').value = '';
    }
    async function del(id) {
        if(!confirm('حذف مركز التكلفة؟')) return;
        await fetch(`${API}/${id}`, { method:'DELETE', headers: Auth.getHeaders() });
        load();
    }
    load();
</script>
<script src="/global-navigation.js"></script>
</body>
</html>
