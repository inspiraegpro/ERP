<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التحقق من المخزون - Wrapstyle ERP</title>
    <link rel="stylesheet" href="/improved-styles.css">
    <style>
        body { font-family: "Segoe UI", Tahoma, sans-serif; background: #f6f8fc; margin: 0; padding: 20px; color: #163a5f; }
        .wrap { max-width: 1300px; margin: 0 auto; }
        .card { background: #fff; border: 1px solid #dbe4ef; border-radius: 14px; padding: 16px; margin-bottom: 14px; }
        .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .btn { border: none; border-radius: 10px; padding: 10px 14px; font-weight: 700; cursor: pointer; }
        .btn-primary { background: #163a5f; color: #fff; }
        .btn-warn { background: #b98918; color: #fff; }
        .btn-light { background: #eef3f8; color: #163a5f; }
        .kpi { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 10px; margin-bottom: 14px; }
        .kpi .box { background: #fff; border: 1px solid #e6edf5; border-radius: 12px; padding: 12px; }
        .kpi .v { font-size: 1.4rem; font-weight: 800; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border-bottom: 1px solid #eef2f7; padding: 10px; text-align: right; }
        th { background: #f8fbff; }
        .ok { color: #0f766e; font-weight: 700; }
        .warn { color: #b45309; font-weight: 700; }
        .err { color: #b91c1c; font-weight: 700; }
        #issues li { padding: 8px 0; border-bottom: 1px dashed #e5e7eb; }
    </style>
</head>
<body>
<div class="wrap">
    <div class="card">
        <h2 style="margin: 0 0 10px;">شاشة التحقق من المخزون</h2>
        <div class="row">
            <button class="btn btn-primary" onclick="runVerification()">تشغيل التحقق</button>
            <button class="btn btn-warn" onclick="fixIssues('rolls')">إصلاح مشاكل الرولات</button>
            <button class="btn btn-light" onclick="fixIssues('products')">مزامنة المنتجات من المخزون</button>
            <span id="statusText" style="color: #526277;">جاهز</span>
        </div>
    </div>

    <div class="kpi">
        <div class="box"><div>المنتجات</div><div class="v" id="kProducts">0</div></div>
        <div class="box"><div>الرولات</div><div class="v" id="kRolls">0</div></div>
        <div class="box"><div>حركات المخزون</div><div class="v" id="kTrx">0</div></div>
        <div class="box"><div>المشاكل</div><div class="v" id="kIssues">0</div></div>
    </div>

    <div class="card">
        <h3 style="margin-top: 0;">نتائج الفحص</h3>
        <table>
            <thead>
                <tr>
                    <th>الفحص</th>
                    <th>الحالة</th>
                    <th>التفاصيل</th>
                    <th>المشاكل</th>
                </tr>
            </thead>
            <tbody id="resultsBody"><tr><td colspan="4">لم يتم التشغيل بعد</td></tr></tbody>
        </table>
    </div>

    <div class="card">
        <h3 style="margin-top: 0;">المشاكل المكتشفة</h3>
        <ul id="issues"><li>لا توجد بيانات بعد.</li></ul>
    </div>

    <div class="card">
        <h3 style="margin-top: 0;">رفع شيت جرد أول المدة بالتكلفة</h3>
        <div class="row">
            <a class="btn btn-light" href="/templates/stock_opening_template.csv" download>تحميل تمبلت الجرد</a>
            <input id="openingFile" type="file" accept=".xlsx,.xls,.csv">
            <button class="btn btn-light" onclick="previewOpeningSheet()">معاينة</button>
            <button class="btn btn-primary" onclick="importOpeningSheet()">استيراد فعلي</button>
        </div>
        <div id="previewBox" style="margin-top: 10px; color: #526277;"></div>
    </div>
</div>

<script src="/common-functions.js"></script>
<script>
    let allResults = [];

    function setStatus(text) {
        document.getElementById("statusText").textContent = text;
    }

    function badge(status) {
        if (status === "success") return '<span class="ok">سليم</span>';
        if (status === "warning") return '<span class="warn">تحذير</span>';
        return '<span class="err">خطأ</span>';
    }

    function getTokenSafe() {
        return (window.Auth && Auth.getToken && Auth.getToken()) || localStorage.getItem("token") || "";
    }

    function getAuthHeaders(isJson = false) {
        const token = getTokenSafe();
        const headers = {};
        if (token) headers.Authorization = `Bearer ${token}`;
        if (isJson) headers["Content-Type"] = "application/json";
        return headers;
    }

    async function runVerification() {
        try {
            setStatus("جاري التحقق...");
            const [products, rolls, trx] = await Promise.all([
                apiCall("/api/products"),
                apiCall("/api/inventory/rolls"),
                apiCall("/api/stock")
            ]);

            const p = Array.isArray(products) ? products : (products.data || []);
            const r = Array.isArray(rolls) ? rolls : (rolls.data || []);
            const t = Array.isArray(trx) ? trx : (trx.data || []);

            const productIssues = p
                .filter((x) => !x.name || String(x.name).trim() === "")
                .map((x) => ({ title: "منتج بلا اسم", description: `ID: ${x._id || "-"}` }));

            const rollIssues = [];
            r.forEach((x) => {
                const rem = Number(x.remainingArea || 0);
                const tot = Number(x.totalArea || x.currentArea || 0);
                if (rem < 0) rollIssues.push({ title: "مساحة سالبة", description: `${x.rollCode || x._id}` });
                if (tot > 0 && rem > tot) rollIssues.push({ title: "المتبقي أكبر من الإجمالي", description: `${x.rollCode || x._id}` });
            });

            const trxIssues = t
                .filter((x) => !x.type || !x.date)
                .map((x) => ({ title: "حركة غير مكتملة", description: `${x.serialNumber || x._id}` }));

            allResults = [
                { name: "المنتجات", status: productIssues.length ? "warning" : "success", details: `${p.length} إجمالي`, issues: productIssues },
                { name: "أرصدة الرولات", status: rollIssues.length ? "warning" : "success", details: `${r.length} رول`, issues: rollIssues },
                { name: "حركات المخزون", status: trxIssues.length ? "warning" : "success", details: `${t.length} حركة`, issues: trxIssues }
            ];

            renderResults(p.length, r.length, t.length);
            setStatus("اكتمل التحقق");
        } catch (e) {
            setStatus("فشل التحقق");
            alert("فشل التحقق: " + (e.message || e));
        }
    }

    function renderResults(productsCount, rollsCount, trxCount) {
        const body = document.getElementById("resultsBody");
        const issues = allResults.flatMap((x) => x.issues || []);

        document.getElementById("kProducts").textContent = productsCount;
        document.getElementById("kRolls").textContent = rollsCount;
        document.getElementById("kTrx").textContent = trxCount;
        document.getElementById("kIssues").textContent = issues.length;

        body.innerHTML = allResults.map((row) => `
            <tr>
                <td>${row.name}</td>
                <td>${badge(row.status)}</td>
                <td>${row.details}</td>
                <td>${(row.issues || []).length}</td>
            </tr>
        `).join("");

        const ul = document.getElementById("issues");
        if (!issues.length) {
            ul.innerHTML = "<li>لا توجد مشاكل مكتشفة.</li>";
            return;
        }

        ul.innerHTML = issues.map((issue) => `<li><strong>${issue.title}</strong> - ${issue.description}</li>`).join("");
    }

    async function fixIssues(type) {
        try {
            setStatus("جاري الإصلاح...");
            if (type === "rolls" || type === "products") {
                const response = await fetch("/api/inventory/sync-products-from-stock", {
                    method: "POST",
                    headers: getAuthHeaders(true),
                    body: JSON.stringify({ dryRun: false })
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.error || data.message || "فشل الإصلاح");
                setStatus("تم الإصلاح بنجاح");
                await runVerification();
                return;
            }
            setStatus("لا يوجد إصلاح تلقائي لهذا النوع");
        } catch (e) {
            setStatus("فشل الإصلاح");
            alert("فشل الإصلاح: " + (e.message || e));
        }
    }

    function getFileOrAlert() {
        const file = document.getElementById("openingFile").files[0];
        if (!file) {
            alert("اختر ملف أولاً");
            return null;
        }
        return file;
    }

    async function previewOpeningSheet() {
        const file = getFileOrAlert();
        if (!file) return;

        const fd = new FormData();
        fd.append("file", file);

        try {
            const token = getTokenSafe();
            const response = await fetch("/api/inventory/opening-balance/preview", {
                method: "POST",
                headers: token ? { Authorization: `Bearer ${token}` } : {},
                body: fd
            });
            const data = await response.json();
            if (!response.ok) throw new Error(data.message || data.error || "فشل المعاينة");

            document.getElementById("previewBox").innerHTML =
                `المعاينة: ${data.totalRows || 0} سطر - رولات: ${data.rolls || 0} - فضلات: ${data.remnants || 0}` +
                (data.sample && data.sample.length ? `<br>عينة من البيانات: ${data.sample.map(s => s.productName).join(', ')}` : '');
        } catch (e) {
            alert("فشل المعاينة: " + (e.message || e));
        }
    }

    async function importOpeningSheet() {
        const file = getFileOrAlert();
        if (!file) return;
        if (!confirm("تأكيد استيراد الشيت كرصيد أول مدة بالتكلفة؟")) return;

        const fd = new FormData();
        fd.append("file", file);

        try {
            const token = getTokenSafe();
            const response = await fetch("/api/inventory/opening-balance/import", {
                method: "POST",
                headers: token ? { Authorization: `Bearer ${token}` } : {},
                body: fd
            });
            const data = await response.json();
            if (!response.ok) throw new Error(data.message || data.error || "فشل الاستيراد");
            alert(`تم الاستيراد بنجاح. رولات: ${data.createdRolls}, قطع: ${data.createdPieces}`);
            await runVerification();
        } catch (e) {
            alert("فشل الاستيراد: " + (e.message || e));
        }
    }

    document.addEventListener("DOMContentLoaded", () => {
        checkAuth();
    });
</script>
<script src="/global-navigation.js"></script>
</body>
</html>
