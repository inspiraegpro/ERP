<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>طباعة إذن مخزني</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 40px; }
        .sheet { border: 2px solid #333; padding: 30px; max-width: 800px; margin: 0 auto; }
        h2 { text-align: center; text-decoration: underline; margin-bottom: 30px; }
        .info { display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #000; padding: 8px; text-align: center; }
        th { background: #eee; }
        .sigs { display: flex; justify-content: space-between; margin-top: 60px; }
        .sig { text-align: center; width: 30%; border-top: 1px solid #000; padding-top: 5px; }
        @media print { .no-print { display: none; } .sheet { border: none; } }
    </style>
</head>
<body>

<div class="sheet">
    <h2 id="title">إذن مخزني</h2>
    
    <div class="info">
        <div>رقم الإذن: <span id="serial"></span></div>
        <div>التاريخ: <span id="date"></span></div>
    </div>
    <div class="info">
        <div>المخزن: <span id="wh"></span></div>
        <div>المرجع: <span id="ref"></span></div>
    </div>

    <table>
        <thead>
            <tr>
                <th>م</th>
                <th>الصنف</th>
                <th>كود الرول</th>
                <th>بيان / قطعة</th>
                <th>الكمية / المساحة</th>
            </tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>

    <div class="sigs">
        <div class="sig">أمين المخزن</div>
        <div class="sig">المستلم</div>
        <div class="sig">المدير المسئول</div>
    </div>
</div>

<div class="no-print" style="text-align:center; margin-top:20px">
    <button onclick="window.print()" style="padding:10px 30px; cursor:pointer">🖨️ طباعة</button>
</div>

<script>
    const API = '/api';
    const token = localStorage.getItem('token') || '';
    function authHeaders() {
        return token ? { Authorization: `Bearer ${token}` } : {};
    }

    window.onload = async () => {
        const id = new URLSearchParams(window.location.search).get('id');
        if(!id) return alert('خطأ في الرابط');
        
        try {
            // جلب الإذن
            const res = await fetch(`${API}/stock/${id}`, { headers: authHeaders() });
            if (!res.ok) throw new Error('تعذر تحميل الإذن المطلوب.');
            const t = await res.json();
            
            // جلب المنتجات عشان نعرض الاسم
            const pRes = await fetch(`${API}/products`, { headers: authHeaders() });
            if (!pRes.ok) throw new Error('تعذر تحميل بيانات المنتجات.');
            const products = await pRes.json();

            document.getElementById('title').innerText = t.type === 'Inbound' ? 'إذن استلام (وارد)' : 'إذن صرف (تشغيل)';
            document.getElementById('serial').innerText = t.serialNumber;
            document.getElementById('date').innerText = new Date(t.date).toLocaleDateString('ar-EG');
            document.getElementById('wh').innerText = t.warehouse || 'الرئيسي';
            document.getElementById('ref').innerText = t.supplierDoc || t.jobOrder || '-';

            const tbody = document.getElementById('tbody');
            t.items.forEach((item, index) => {
                const prod = item.product && typeof item.product === 'object'
                    ? item.product
                    : products.find(p => p._id === item.product) || { name: item.productName || 'غير معروف' };
                const qtyText = t.type === 'Inbound'
                    ? (item.quantity || item.area || item.receivedArea || '-')
                    : ((item.consumedArea !== undefined ? item.consumedArea : item.area) + ' سم2');
                
                tbody.innerHTML += `
                    <tr>
                        <td>${index+1}</td>
                        <td>${prod.name || 'غير معروف'}</td>
                        <td>${item.rollCode || item.pieceCode || '-'}</td>
                        <td>${item.partName || '-'}</td>
                        <td>${qtyText}</td>
                    </tr>
                `;
            });

        } catch(e) { alert('خطأ في التحميل'); }
    };
</script>
    <script src="/global-navigation.js"></script>
</body>
</html>
